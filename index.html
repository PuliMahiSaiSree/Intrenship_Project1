<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simple Task Manager</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(145deg, #f6f9fc 0%, #e9f0f5 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }

    .task-card {
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 2.5rem;
      box-shadow: 0 20px 40px -12px rgba(0, 20, 30, 0.25),
                  0 8px 24px -6px rgba(0, 0, 0, 0.05);
      padding: 2rem 2rem 2.2rem;
      max-width: 700px;
      width: 100%;
      border: 1px solid rgba(255, 255, 255, 0.4);
      transition: all 0.2s ease;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: #1a2e3f;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 1.8rem;
      border-bottom: 2px solid rgba(60, 100, 130, 0.15);
      padding-bottom: 0.8rem;
    }

    h1 span {
      background: #2c4c6b;
      color: white;
      font-size: 1.1rem;
      font-weight: 500;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      margin-left: 0.3rem;
    }

    .input-area {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 2.2rem;
      flex-wrap: wrap;
    }

    #taskInput {
      flex: 1 1 200px;
      padding: 0.9rem 1.4rem;
      border: none;
      border-radius: 60px;
      background: white;
      box-shadow: inset 0 2px 6px rgba(0,0,0,0.02), 0 4px 12px rgba(0, 20, 30, 0.06);
      font-size: 1rem;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    #taskInput:focus {
      outline: none;
      border-color: #3b7a9e;
      box-shadow: 0 0 0 4px rgba(59, 122, 158, 0.15), inset 0 2px 6px rgba(0,0,0,0.02);
      background: #ffffff;
    }

    #taskInput::placeholder {
      color: #8a9caa;
      font-weight: 350;
    }

    .btn {
      border: none;
      background: white;
      padding: 0.9rem 1.8rem;
      border-radius: 60px;
      font-weight: 550;
      font-size: 0.95rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.3rem;
      box-shadow: 0 4px 10px rgba(0, 20, 30, 0.04);
      transition: all 0.2s;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.5);
      color: #1f3a4e;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(2px);
    }

    .btn-primary {
      background: #1f3a4e;
      color: white;
      border: 1px solid #1f3a4e;
      box-shadow: 0 8px 16px -8px rgba(26, 46, 63, 0.25);
    }

    .btn-primary:hover {
      background: #15303f;
      transform: scale(0.97);
      box-shadow: 0 4px 10px rgba(26, 46, 63, 0.2);
    }

    .btn-primary:active {
      transform: scale(0.94);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #bfd3df;
      color: #1f3a4e;
    }

    .btn-outline:hover {
      background: rgba(255,255,255,0.5);
      border-color: #8aaec2;
    }

    .btn-danger {
      background: transparent;
      color: #b03a4e;
      border: 1px solid #f5d6dc;
      padding: 0.4rem 1rem;
      font-size: 0.8rem;
      border-radius: 40px;
    }

    .btn-danger:hover {
      background: #fff0f0;
      border-color: #d48a9a;
    }

    .task-stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      color: #2d4b5e;
      background: rgba(255, 255, 255, 0.4);
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      margin-bottom: 1.8rem;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .task-stats span {
      font-weight: 600;
      color: #0e2a3b;
    }

    .task-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
      max-height: 380px;
      overflow-y: auto;
      padding-right: 0.3rem;
    }

    .task-list::-webkit-scrollbar {
      width: 5px;
    }

    .task-list::-webkit-scrollbar-track {
      background: rgba(0,0,0,0.02);
      border-radius: 10px;
    }

    .task-list::-webkit-scrollbar-thumb {
      background: #b7cfdd;
      border-radius: 10px;
    }

    .task-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.8rem;
      background: white;
      padding: 0.8rem 1.2rem 0.8rem 1.6rem;
      border-radius: 80px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      border: 1px solid rgba(200, 215, 225, 0.3);
      transition: all 0.15s;
      backdrop-filter: blur(2px);
    }

    .task-item:hover {
      border-color: #b8d0de;
      background: #ffffff;
      box-shadow: 0 8px 18px -10px rgba(20, 50, 70, 0.08);
    }

    .task-content {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex: 1;
      min-width: 0;
    }

    .task-check {
      width: 22px;
      height: 22px;
      accent-color: #1f5a7a;
      cursor: pointer;
      flex-shrink: 0;
      transition: 0.1s;
    }

    .task-text {
      font-size: 1rem;
      word-break: break-word;
      color: #1f3343;
      transition: color 0.15s;
      padding: 0.2rem 0;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #7a96aa;
    }

    .task-actions {
      display: flex;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .task-actions .btn {
      padding: 0.3rem 0.9rem;
      font-size: 0.8rem;
      border-radius: 40px;
      background: transparent;
    }

    .task-actions .btn-delete {
      border: 1px solid #f0d6dc;
      color: #b03a4e;
    }

    .task-actions .btn-delete:hover {
      background: #fee9ec;
      border-color: #d48a9a;
    }

    .empty-message {
      text-align: center;
      color: #6b8ba0;
      padding: 2rem 0.5rem;
      font-style: italic;
      background: rgba(255,255,255,0.2);
      border-radius: 80px;
      border: 1px dashed #bdd3e0;
      font-weight: 350;
    }

    .footer-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 1.5rem;
    }

    #clearAllBtn {
      background: transparent;
      border: 1px solid #d7e2ea;
      color: #3d6177;
      padding: 0.4rem 1.6rem;
      font-size: 0.8rem;
      border-radius: 40px;
      transition: 0.1s;
    }

    #clearAllBtn:hover {
      background: #f0f6fa;
      border-color: #b0cbd9;
    }

    @media (max-width: 500px) {
      .task-card { padding: 1.5rem; }
      h1 { font-size: 1.8rem; }
      .input-area { flex-direction: column; }
      .btn { width: 100%; justify-content: center; }
      .task-item { flex-wrap: wrap; padding: 0.8rem 1rem; border-radius: 30px; }
      .task-actions { margin-left: auto; }
    }
  </style>
</head>
<body>
  <div class="task-card" role="main">
    <h1>
      📋 Tasks
      <span id="taskCount">0</span>
    </h1>

    <!-- input area -->
    <div class="input-area">
      <input type="text" id="taskInput" placeholder="e.g., prepare meeting notes" aria-label="New task description">
      <button class="btn btn-primary" id="addTaskBtn">➕ Add task</button>
    </div>

    <!-- stats -->
    <div class="task-stats">
      <span>✅ <span id="completedCount">0</span> done</span>
      <span>⏳ <span id="pendingCount">0</span> pending</span>
    </div>

    <!-- task list -->
    <ul class="task-list" id="taskList" aria-label="Task list">
      <li class="empty-message">✨ No tasks yet — add one above</li>
    </ul>

    <!-- footer -->
    <div class="footer-actions">
      <button class="btn" id="clearAllBtn">🗑️ Clear all</button>
    </div>
  </div>

  <script>
    (function() {
      // ----- state -----
      let tasks = [];

      // ----- DOM refs -----
      const taskListEl = document.getElementById('taskList');
      const taskInput = document.getElementById('taskInput');
      const addBtn = document.getElementById('addTaskBtn');
      const clearAllBtn = document.getElementById('clearAllBtn');
      const taskCountSpan = document.getElementById('taskCount');
      const completedCountSpan = document.getElementById('completedCount');
      const pendingCountSpan = document.getElementById('pendingCount');

      // ----- helpers / render -----
      function render() {
        // update counters
        const total = tasks.length;
        const completed = tasks.filter(t => t.done).length;
        const pending = total - completed;
        taskCountSpan.textContent = total;
        completedCountSpan.textContent = completed;
        pendingCountSpan.textContent = pending;

        // clear list
        taskListEl.innerHTML = '';

        if (total === 0) {
          const emptyLi = document.createElement('li');
          emptyLi.className = 'empty-message';
          emptyLi.textContent = '✨ No tasks yet — add one above';
          taskListEl.appendChild(emptyLi);
          return;
        }

        // build task items
        tasks.forEach((task, index) => {
          const li = document.createElement('li');
          li.className = 'task-item' + (task.done ? ' completed' : '');
          li.dataset.index = index;

          // content wrapper
          const contentDiv = document.createElement('div');
          contentDiv.className = 'task-content';

          // checkbox
          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.className = 'task-check';
          checkbox.checked = task.done;
          checkbox.setAttribute('aria-label', `Mark "${task.text}" as ${task.done ? 'incomplete' : 'complete'}`);
          checkbox.addEventListener('change', function(e) {
            e.stopPropagation();
            toggleTask(index);
          });

          // text
          const textSpan = document.createElement('span');
          textSpan.className = 'task-text';
          textSpan.textContent = task.text;

          contentDiv.appendChild(checkbox);
          contentDiv.appendChild(textSpan);

          // actions
          const actionsDiv = document.createElement('div');
          actionsDiv.className = 'task-actions';

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'btn btn-delete';
          deleteBtn.textContent = '✕';
          deleteBtn.setAttribute('aria-label', `Delete task "${task.text}"`);
          deleteBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            deleteTask(index);
          });

          actionsDiv.appendChild(deleteBtn);
          li.appendChild(contentDiv);
          li.appendChild(actionsDiv);
          taskListEl.appendChild(li);
        });
      }

      // ----- CRUD operations -----
      function addTask(text) {
        const trimmed = text.trim();
        if (trimmed === '') {
          alert('Please enter a task description.');
          return false;
        }
        tasks.push({ text: trimmed, done: false });
        render();
        taskInput.value = '';
        taskInput.focus();
        return true;
      }

      function toggleTask(index) {
        if (index >= 0 && index < tasks.length) {
          tasks[index].done = !tasks[index].done;
          render();
        }
      }

      function deleteTask(index) {
        if (index >= 0 && index < tasks.length) {
          tasks.splice(index, 1);
          render();
        }
      }

      function clearAllTasks() {
        if (tasks.length === 0) return;
        if (confirm('Delete all tasks?')) {
          tasks = [];
          render();
          taskInput.focus();
        }
      }

      // ----- event listeners -----
      addBtn.addEventListener('click', function() {
        addTask(taskInput.value);
      });

      taskInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          addTask(taskInput.value);
        }
      });

      clearAllBtn.addEventListener('click', clearAllTasks);

      // small bonus: if input is empty, pressing enter with empty does nothing (handled by addTask)
      // initial render (empty state)
      render();

      // (optional) demo data – uncomment if you want pre-filled examples
      /*
      tasks = [
        { text: 'Review project proposal', done: false },
        { text: 'Buy groceries', done: true },
        { text: 'Call dentist', done: false },
      ];
      render();
      */
    })();
  </script>
</body>
</html>
